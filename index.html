<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>AppRegin</title>
    <base href="/">
  </head>

  <body>
    <div id="loading-screen">
      <style>
        body {
          margin: 0;
          background: #000;
          color: #fff;
          font-family: 'Segoe UI', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
        }

        #loading-screen {
          animation: fadeIn 0.5s ease-in-out;
          font-size: 1.2rem;
          text-align: center;
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
      </style>

      <div>✨ API REGGIE – Connecting<span class="dots">.</span></div>

      <script>
        const dots = document.querySelector(".dots");
        let count = 0;
        setInterval(() => {
          dots.textContent = ".".repeat((++count % 4) || 1);
        }, 400);
      </script>
    </div>

    <script src="main.dart.js" defer></script>
  </body>
</html>
